name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verificar:
    name: Lint, typecheck y tests
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci --legacy-peer-deps

      - name: ESLint
        run: npx eslint .

      - name: TypeScript (sin emitir archivos)
        run: npx tsc --noEmit

      - name: Tests unitarios
        run: npx vitest run

      - name: Build de producción (con variables de entorno de prueba)
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder"
          SUPABASE_SERVICE_ROLE_KEY: "placeholder"
          MERCADOPAGO_ACCESS_TOKEN: "placeholder"
          MERCADOPAGO_WEBHOOK_SECRET: "placeholder"
          MERCADOPAGO_CLIENT_ID: "placeholder"
          MERCADOPAGO_CLIENT_SECRET: "placeholder"
          NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
